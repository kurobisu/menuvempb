<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Bem-vindo ao Menuvem PB. Aumente o faturamento do seu negócio na Paraíba com cardápio digital próprio, 30 dias grátis e suporte humano todos os dias.">
    <meta name="keywords" content="cardápio digital, gestor de pedidos, menuvem pb, paraíba, joão pessoa, automação de restaurantes">
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://menuvempb.com.br/">
    <meta property="og:title" content="Bem-vindo | Menuvem PB - Cardápio Digital e Gestor de Pedidos">
    <meta property="og:description" content="Aumente o faturamento do seu negócio na Paraíba com cardápio próprio sem comissão, personalização de cardápio inclusa, 30 dias grátis e suporte humano todos os dias.">
    <meta property="og:image" content="https://menuvempb.com.br/img/menuvem-logo-simples.png">

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:url" content="https://menuvempb.com.br/">
    <meta property="twitter:title" content="Bem-vindo | Menuvem PB">
    <meta property="twitter:description" content="Aumente o faturamento do seu negócio na Paraíba com cardápio próprio sem comissão, 30 dias grátis e suporte humano todos os dias.">
    <meta property="twitter:image" content="https://menuvempb.com.br/img/menuvem-logo-simples.png">

    <link rel="icon" type="image/png" href="img/menuvem-logo-simples.png">
    <title>[Boas-Vindas] Apresentação | Menuvem PB</title>

    <link rel="stylesheet" href="css/style.css?v=5">
    
    <link rel="stylesheet" href="css/index.css">

    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-WMFHH39Q0N"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());

      gtag('config', 'G-WMFHH39Q0N');
    </script>
</head>

<body>
    <div class="particles"></div>

    <a href="site.html" class="top-left-logo reveal">
        <img src="img/menuvem-logo-simples.png" alt="Menuvem PB">
    </a>

    
    <div class="entrada-container">
        <a href="site.html" class="entrada-logo reveal">
            <img src="img/menuvem-logo-simples.png" alt="Logo" height="24" style="margin-right: 4px;">
                <span class="logo-text" style="display:flex; align-items:center;">Menuvem<span class="logo-dot">.</span>PB<img src="img/bandeiradaparaiba.png" alt="Bandeira PB" height="18" style="margin-left: 8px; border-radius:2px; box-shadow: 0 0 12px rgba(255, 255, 255, 0.8);"></span>
        </a>

        <h1 class="entrada-title reveal delay-100">Como podemos ajudar você hoje?</h1>

        <div class="options-grid">
            
            <!-- Opção 1: Já sou cliente -->
            <a href="https://painel.menuvem.com.br" class="option-card card-secondary reveal delay-200">
                <div class="option-icon">
                    <svg xmlns="http://www.w3.org/2000/svg" width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                        <circle cx="12" cy="7" r="4"></circle>
                    </svg>
                </div>
                <h2 class="option-title">Já sou cliente</h2>
                <p class="option-desc">Acesse sua conta para gerenciar seus pedidos, cardápio e relatórios.</p>
                <div class="option-btn">Acessar o Painel</div>
            </a>

            <!-- Opção 2: Quero conhecer -->
            <a href="site.html" class="option-card card-primary reveal delay-300">
                <div class="option-icon">
                    <svg xmlns="http://www.w3.org/2000/svg" width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M22 12h-4l-3 9L9 3l-3 9H2"></path>
                    </svg>
                </div>
                <h2 class="option-title">Conheça a Menuvem</h2>
                <p class="option-desc">Descubra como o Menuvem.PB pode transformar a gestão do seu negócio.</p>
                <div class="option-btn">Quero conhecer a Menuvem</div>
            </a>

        </div>
    </div>

    <script src="js/main.js"></script>
    <script>
        // Trigger reveal animations
        document.addEventListener('DOMContentLoaded', () => {
            const reveals = document.querySelectorAll('.reveal');
            setTimeout(() => {
                reveals.forEach(element => {
                    element.classList.add('active');
                });
            }, 100);
        });
    </script>
</body>
</html>
